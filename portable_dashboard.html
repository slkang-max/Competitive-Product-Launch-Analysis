<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 경쟁사 출시 분석 대시보드 (Portable)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            /* Brand Colors */
            --brand-blue: #3b82f6;
            --brand-purple: #8b5cf6;
            --brand-pink: #ec4899;
            --brand-teal: #14b8a6;
            --brand-orange: #f97316;
            
            /* Glass Effect */
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
            --glass-hover-border: rgba(255, 255, 255, 0.2);
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Animated Shapes */
        .bg-shape {
            position: absolute;
            filter: blur(100px);
            z-index: -1;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .bg-shape-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, rgba(15,23,42,0) 70%);
            top: -200px;
            left: -100px;
        }

        .bg-shape-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%);
            bottom: -100px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Common Layout */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            padding: 24px;
            gap: 24px;
            max-width: 1920px;
            margin: 0 auto;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
        }

        .glass-panel:hover {
            border-color: var(--glass-hover-border);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-purple));
            border-radius: var(--radius-sm);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .logo h2 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(59,130,246,0.1) 0%, transparent 100%);
            color: var(--brand-blue);
            border-left: 3px solid var(--brand-blue);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(15, 23, 42, 0.4);
            border-bottom: 1px solid var(--glass-border);
            gap: 20px;
            flex-wrap: nowrap;
            margin-bottom: 40px;
        }

        .header-titles {
            flex-shrink: 0;
        }

        .header-titles h1 {
            font-size: 1.25rem;
            font-weight: 800;
            margin: 0;
            white-space: nowrap;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            justify-content: flex-end;
            min-width: 0;
        }

        .search-box {
            position: relative;
            width: 200px;
            flex-shrink: 1;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        #productSearch {
            width: 100%;
            padding: 10px 14px 10px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        #productSearch:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--brand-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        /* 필터 버튼 섹션 */
        .filter-container {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .filter-container::-webkit-scrollbar { display: none; }
        
        .sub-filter-container {
            display: none;
            gap: 12px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--glass-border);
            overflow-x: auto;
            scrollbar-width: none;
            align-items: center;
        }
        .sub-filter-container.active { display: flex; }
        .sub-filter-label {
            font-size: 0.8rem;
            color: var(--brand-blue);
            font-weight: 700;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .filter-btn {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--brand-blue);
            color: white;
            border-color: var(--brand-blue);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .card {
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.15);
        }

        .card-title {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .card-value {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .brand-gradient-text {
            background: linear-gradient(135deg, var(--brand-pink), var(--brand-purple));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .insight-panel {
            padding: 24px 32px;
            margin-bottom: 8px;
            border-left: 4px solid var(--brand-blue);
        }

        .insight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .insight-header h3 { font-size: 1.1rem; font-weight: 700; }

        .insight-content { font-size: 0.95rem; line-height: 1.7; }
        .insight-content strong { color: var(--brand-blue); }

        .chart-container {
            flex-grow: 1;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            min-height: 450px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .chart-header h3 { font-size: 1.25rem; font-weight: 600; }

        .canvas-wrapper {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .table-container {
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            max-height: 450px;
        }

        .table-header { margin-bottom: 16px; }
        .table-header h3 { font-size: 1.25rem; font-weight: 600; }

        .table-wrapper {
            overflow-y: auto;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-sm);
            background: rgba(0,0,0,0.1);
        }

        /* Custom Scrollbar */
        .table-wrapper::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-wrapper::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 8px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 8px; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        #dataTable { table-layout: auto; }
        th, td { white-space: nowrap; }

        #dataTable thead tr { background: rgba(30, 41, 59, 1); }

        th {
            background: inherit;
            backdrop-filter: blur(8px);
            padding: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        tr:hover td { background: rgba(255, 255, 255, 0.03); }

        #dataTable th:last-child, #dataTable td:last-child {
            width: 100%;
            text-align: right;
            padding-right: 32px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .badge.category-Water { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa; }
        .badge.category-Air { background: rgba(20, 184, 166, 0.15); border: 1px solid rgba(20, 184, 166, 0.3); color: #2dd4bf; }
        .badge.category-BEREX { background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3); color: #a78bfa; }
        .badge.category-Living { background: rgba(249, 115, 22, 0.15); border: 1px solid rgba(249, 115, 22, 0.3); color: #fb923c; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            position: relative;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 1000px; max-height: 85vh;
            padding: 32px; overflow-y: auto;
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .comparison-table-wrapper { overflow-x: auto; }
        #comparison-table { table-layout: fixed; width: 100%; }
        #comparison-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px; font-size: 0.95rem; text-align: center;
            border-bottom: 2px solid var(--glass-border);
        }
        #comparison-table td {
            padding: 16px; border-bottom: 1px solid var(--glass-border);
            text-align: center; font-size: 0.95rem;
        }
        #comparison-table td:first-child {
            width: 150px; background: rgba(255, 255, 255, 0.02);
            font-weight: 600; color: var(--text-secondary); text-align: left;
        }

        .btn-compare {
            padding: 6px 12px; background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4); border-radius: 4px;
            color: #60a5fa; font-size: 0.75rem; cursor: pointer; transition: var(--transition);
        }
        .btn-compare:hover, .btn-compare.selected { background: var(--brand-blue); color: white; }

        /* Planning */
        .planning-grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
        .planning-editor, .planning-result { padding: 24px; }
        .editor-form { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.85rem; color: var(--text-secondary); }
        .form-group input, .form-group select {
            padding: 10px 14px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: white;
        }
        .primary-btn {
            padding: 14px; background: linear-gradient(135deg, var(--brand-blue), var(--brand-purple));
            border: none; border-radius: var(--radius-sm); color: white; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }
        .secondary-btn {
            padding: 10px 18px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
            color: var(--text-secondary); font-weight: 600; cursor: pointer;
        }

        /* Compare Bar */
        .compare-bar {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(150%);
            min-width: 600px; padding: 16px 32px;
            display: flex; align-items: center; gap: 24px; z-index: 1500;
            transition: var(--transition);
        }
        .compare-bar.active { transform: translateX(-50%) translateY(0); }
        .compare-item-tag {
            background: rgba(255, 255, 255, 0.08); padding: 6px 12px;
            border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
        }

        /* Custom Tooltip */
        .custom-tooltip {
            position: absolute; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: #f8fafc; padding: 16px; opacity: 0;
            z-index: 100; min-width: 260px; pointer-events: none;
            transform: translate(-50%, -100%); transition: opacity 0.2s;
        }
        .custom-tooltip-header { font-size: 1.15rem; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 12px; }
        .tooltip-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
        .tooltip-label { color: var(--text-secondary); }

        @media (max-width: 1024px) {
            .dashboard-container { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; justify-content: space-between; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <div class="logo-icon"></div>
                <h2>Insight</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" id="nav-launch-trend">📊 출시 동향</a>
                <a href="#" class="nav-item" id="nav-market-share">📈 시장 점유율</a>
                <a href="#" class="nav-item" id="nav-new-planning">💡 신규 기획안</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Launch Trend View -->
            <section id="section-launch-trend">
                <header class="header glass-panel">
                    <div class="header-titles">
                        <h1>2025년 경쟁사 제품 출시 동향</h1>
                    </div>
                    <div class="header-actions">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="productSearch" placeholder="제품 또는 제조사 검색...">
                        </div>
                        <div class="filter-container" id="filterContainer">
                            <button class="filter-btn active" data-category="All">전체</button>
                            <button class="filter-btn" data-category="Water">정수기</button>
                            <button class="filter-btn" data-category="Air">청정/제습</button>
                            <button class="filter-btn" data-category="BEREX">BEREX</button>
                            <button class="filter-btn" data-category="Living">생활가전</button>
                        </div>
                    </div>
                </header>
                <div id="subFilterContainer" class="sub-filter-container"></div>

                <div class="content-grid">
                    <div class="summary-cards">
                        <div class="card glass-panel highlight-card">
                            <div class="card-title">총 분석 제품 수</div>
                            <div class="card-value brand-gradient-text" id="total-product-count">0개</div>
                        </div>
                        <div class="card glass-panel">
                            <div class="card-title">평균가 (렌탈/일시불)</div>
                            <div class="card-value" id="avg-price" style="font-size: 1.5rem;">0원 / 0원</div>
                        </div>
                        <div class="card glass-panel">
                            <div class="card-title">최고가 모델</div>
                            <div class="card-value" id="highest-price" style="font-size: 1.5rem;">0원</div>
                            <div class="card-desc" id="highest-price-desc">-</div>
                        </div>
                    </div>

                    <div class="glass-panel insight-panel">
                        <h3>🔍 AI 마켓 트렌드 분석</h3>
                        <div id="launch-insight-panel" class="insight-content">데이터 분석 중...</div>
                    </div>

                    <div class="chart-container glass-panel">
                        <div class="chart-header"><h3>월별 출시 분포</h3></div>
                        <div class="canvas-wrapper"><canvas id="marketBubbleChart"></canvas></div>
                    </div>

                    <div class="table-container glass-panel">
                        <div class="table-header"><h3>상세 데이터 항목</h3></div>
                        <div class="table-wrapper">
                            <table id="dataTable">
                                <thead>
                                    <tr>
                                        <th>출시일</th><th>카테고리</th><th>설치타입</th><th>제조사</th><th>모델명</th><th>제품명</th><th>사양</th><th>기능</th><th>가격정보</th><th>비교</th>
                                    </tr>
                                </thead>
                                <tbody id="dataTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Market Share View -->
            <section id="section-market-share" style="display:none;">
                <header class="header glass-panel">
                    <h1>시장 점유율 분석</h1>
                    <div class="filter-container" id="marketShareFilter">
                        <button class="filter-btn active" data-share-category="All">전체</button>
                    </div>
                </header>
                <div class="content-grid">
                    <div class="summary-cards">
                        <div class="card glass-panel highlight-card">
                            <div class="card-title">시장 리더</div>
                            <div class="card-value brand-gradient-text" id="market-leader">-</div>
                        </div>
                    </div>
                    <div id="market-insight-panel" class="glass-panel" style="padding:20px; margin-bottom:20px;">
                        <div id="market-insight-text"></div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px;">
                        <div class="chart-container glass-panel">
                            <div class="canvas-wrapper"><canvas id="companyShareChart"></canvas></div>
                        </div>
                        <div class="chart-container glass-panel">
                            <div class="canvas-wrapper"><canvas id="categoryShareChart"></canvas></div>
                        </div>
                    </div>
                    <div class="chart-container glass-panel">
                        <div class="canvas-wrapper"><canvas id="shareTrendChart"></canvas></div>
                    </div>
                </div>
            </section>

            <!-- New Planning View -->
            <section id="section-new-planning" style="display:none;">
                <header class="header glass-panel"><h1>신규 제품 기획 시뮬레이션</h1></header>
                <div class="planning-grid">
                    <div class="glass-panel planning-editor">
                        <h3>목표 사양 입력</h3>
                        <div class="editor-form">
                            <div class="form-group"><label>프로젝트명</label><input type="text" id="plan-name" value="Project New"></div>
                            <div class="form-group"><label>카테고리</label>
                                <select id="plan-category">
                                    <option value="Water">정수기</option><option value="Air">청정/제습</option>
                                    <option value="BEREX">BEREX</option><option value="Living">생활가전</option>
                                </select>
                            </div>
                            <div class="form-group"><label>목표 렌탈가</label><input type="number" id="plan-rental-price" value="29900"></div>
                            <div class="form-group"><label>목표 일시불가</label><input type="number" id="plan-lump-price" value="1500000"></div>
                            <button class="primary-btn" id="btn-run-simulation">분석 실행</button>
                        </div>
                    </div>
                    <div class="glass-panel planning-result">
                        <h3>시장 포지셔닝 분석</h3>
                        <div id="positioning-canvas-holder" style="height:400px;"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Comparison -->
    <div id="compare-bar" class="compare-bar glass-panel">
        <div class="compare-info"><span id="compare-count">0</span>/3 선택됨</div>
        <div id="compare-items" class="compare-items"></div>
        <button id="btn-open-compare" class="primary-btn" disabled>비교하기</button>
        <button id="btn-clear-compare" class="secondary-btn">초기화</button>
    </div>

    <div id="comparison-modal" class="modal">
        <div class="modal-content glass-panel">
            <div class="modal-header"><h2>사양 비교</h2><span class="close-modal" onclick="closeModal('comparison-modal')">&times;</span></div>
            <div class="comparison-table-wrapper">
                <table id="comparison-table">
                    <thead><tr id="comparison-header-row"><th>항목</th></tr></thead>
                    <tbody id="comparison-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bubble Detail Modal -->
    <div id="bubble-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="bubble-modal-title">제품 상세 정보</h2>
                <span class="close-modal" onclick="closeModal('bubble-modal')">&times;</span>
            </div>
            <div id="bubble-modal-body" style="line-height: 1.8;">
                <!-- 내용 동적 생성 -->
            </div>
            <div style="margin-top: 24px; text-align: right;">
                <button class="secondary-btn" onclick="closeModal('bubble-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div id="chartjs-tooltip" class="custom-tooltip"></div>

    <script>
        // Data and Logic merged from script.js
        const COLORS = { Water: '#3b82f6', Air: '#14b8a6', BEREX: '#8b5cf6', Living: '#f97316' };
        const rawData = [
            {"year": 2025, "month": 1, "category": "Water", "company": "현대렌탈", "productName": "더퓨어나노S", "modelName": "PWP-S200", "price": 28900, "installType": "데스크탑", "lumpSumPrice": 1400000, "capacity": "직수", "iceCapacity": "-", "purifyType": "나노", "feature": "살균수"},
            {"year": 2025, "month": 2, "category": "Water", "company": "쿠쿠", "productName": "스팀100 정수기", "modelName": "CP-AS100", "price": 31900, "installType": "스탠드", "lumpSumPrice": 2000000, "capacity": "직수", "iceCapacity": "1kg", "purifyType": "RO", "feature": "끓는물"},
            {"year": 2025, "month": 3, "category": "Water", "company": "코웨이", "productName": "아이콘 정수기 3", "modelName": "CHP-7211N", "price": 34900, "installType": "데스크탑", "lumpSumPrice": 1500000, "capacity": "직수", "iceCapacity": "-", "purifyType": "나노", "feature": "초소형"},
            {"year": 2025, "month": 4, "category": "Water", "company": "LG전자", "productName": "퓨리케어 오브제", "modelName": "WU900AS", "price": 38900, "installType": "빌트인", "lumpSumPrice": 2200000, "capacity": "직수", "iceCapacity": "-", "purifyType": "나노", "feature": "음성인식"},
            {"year": 2025, "month": 5, "category": "Air", "company": "삼성전자", "productName": "비스포크 큐브", "modelName": "AX053C", "price": 45900, "installType": "스탠드", "lumpSumPrice": 1800000, "capacity": "20평형", "iceCapacity": "-", "purifyType": "HEPA", "feature": "무풍"},
            {"year": 2025, "month": 6, "category": "Air", "company": "코웨이", "productName": "노블 공기청정기", "modelName": "AP-1521B", "price": 42900, "installType": "타워형", "lumpSumPrice": 1600000, "capacity": "15평형", "iceCapacity": "-", "purifyType": "HEPA", "feature": "디자인"},
            {"year": 2025, "month": 4, "category": "BEREX", "company": "세라젬", "productName": "파우제 M10", "modelName": "SJM-M10", "price": 129900, "installType": "안마의자", "lumpSumPrice": 7400000, "capacity": "-", "iceCapacity": "-", "purifyType": "-", "feature": "의료기기"},
            {"year": 2025, "month": 6, "category": "BEREX", "company": "시몬스", "productName": "N32 모션베드", "modelName": "", "price": 189900, "installType": "침대", "lumpSumPrice": 9500000, "capacity": "-", "iceCapacity": "-", "purifyType": "-", "feature": "전동리클"},
            {"year": 2025, "month": 7, "category": "Living", "company": "휘슬러코리아", "productName": "마에스트로 루나 3", "modelName": "CMS-J310GR", "price": 59900, "installType": "인덕션", "lumpSumPrice": 3500000, "capacity": "-", "iceCapacity": "-", "purifyType": "-", "feature": "독일직수입"}
        ];

        const MARKET_SHARE_DATA = {
            all: { labels: ['코웨이', 'LG전자', 'SK매직', '쿠쿠', '기타'], shares: [35, 22, 15, 12, 16] },
            trends: { labels: ['24.1Q', '24.2Q', '24.3Q', '24.4Q', '25.1Q'], datasets: [
                { label: '코웨이', data: [33.5, 34, 34.5, 34.8, 35], color: '#3b82f6' },
                { label: 'LG전자', data: [20, 20.8, 21.2, 21.8, 22], color: '#ef4444' }
            ]}
        };

        let marketBubbleChart, companyShareChart, categoryShareChart, shareTrendChart, planningChart;
        let currentCategory = 'All', currentSubCategory = 'All', compareList = [];

        function init() {
            updateSummary(rawData);
            renderTable(rawData);
            initCharts();
            setupEvents();
            updateSubFilters(); 
        }

        function updateSummary(data) {
            const count = data.length;
            const avg = data.reduce((a, b) => a + b.price, 0) / count || 0;
            const avgLump = data.reduce((a, b) => a + b.lumpSumPrice, 0) / count || 0;
            document.getElementById('total-product-count').textContent = count + '개';
            document.getElementById('avg-price').textContent = `${Math.round(avg).toLocaleString()}원 / ${Math.round(avgLump).toLocaleString()}원`;
            
            const max = data.reduce((prev, current) => (prev.price > current.price) ? prev : current, data[0] || {price:0});
            document.getElementById('highest-price').textContent = max.price.toLocaleString() + '원';
            document.getElementById('highest-price-desc').textContent = max.productName || '-';
            
            updateAIInsight(data);
        }

        function updateAIInsight(data) {
            const panel = document.getElementById('launch-insight-panel');
            if(!data.length) {
                panel.innerHTML = "해당 조건의 데이터가 없습니다.";
                return;
            }
            panel.innerHTML = `현재 선택된 조건의 제품은 총 <strong>${data.length}개</strong>이며, 평균 렌탈가는 <strong>${Math.round(data.reduce((a,b)=>a+b.price,0)/data.length).toLocaleString()}원</strong> 수준입니다.`;
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>2025년 ${item.month}월</td>
                    <td><span class="badge category-${item.category}">${item.category}</span></td>
                    <td>${item.installType}</td>
                    <td>${item.company}</td>
                    <td>${item.modelName || '-'}</td>
                    <td>${item.productName}</td>
                    <td>${item.capacity || '-'}</td>
                    <td>${item.feature || '-'}</td>
                    <td>${item.price.toLocaleString()}원</td>
                    <td><button class="btn-compare ${compareList.some(i => i.productName === item.productName) ? 'selected' : ''}" onclick="toggleCompare('${item.productName}')">비교</button></td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const searchTerm = document.getElementById('productSearch').value.toLowerCase();
            
            const filtered = rawData.filter(d => {
                const matchCategory = currentCategory === 'All' || d.category === currentCategory;
                const matchSub = currentSubCategory === 'All' || d.installType === currentSubCategory;
                const matchSearch = d.productName.toLowerCase().includes(searchTerm) || d.company.toLowerCase().includes(searchTerm);
                return matchCategory && matchSub && matchSearch;
            });

            updateSummary(filtered);
            renderTable(filtered);
            updateCharts(filtered);
        }

        function updateCharts(filteredData) {
            if (marketBubbleChart) {
                marketBubbleChart.data.datasets[0].data = filteredData.map(d => ({
                    x: d.month,
                    y: d.price,
                    r: 10 + d.lumpSumPrice/500000,
                    productName: d.productName,
                    modelName: d.modelName,
                    company: d.company
                }));
                marketBubbleChart.update();
            }
        }

        function updateSubFilters() {
            const subContainer = document.getElementById('subFilterContainer');
            if (currentCategory === 'All') {
                subContainer.classList.remove('active');
                subContainer.innerHTML = '';
                currentSubCategory = 'All';
                return;
            }

            const subCategories = [...new Set(rawData.filter(d => d.category === currentCategory).map(d => d.installType))];
            
            if (subCategories.length > 0) {
                subContainer.classList.add('active');
                subContainer.innerHTML = `<span class="sub-filter-label">Sub Category:</span>` + 
                    `<button class="filter-btn ${currentSubCategory === 'All' ? 'active' : ''}" data-sub="All">전체 타입</button>` + 
                    subCategories.map(s => `<button class="filter-btn ${currentSubCategory === s ? 'active' : ''}" data-sub="${s}">${s}</button>`).join('');
                
                subContainer.querySelectorAll('button').forEach(btn => {
                    btn.onclick = () => {
                        subContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentSubCategory = btn.dataset.sub;
                        applyFilters();
                    };
                });
            } else {
                subContainer.classList.remove('active');
                currentSubCategory = 'All';
            }
        }

        function initCharts() {
            const ctx = document.getElementById('marketBubbleChart').getContext('2d');
            marketBubbleChart = new Chart(ctx, {
                type: 'bubble',
                data: {
                    datasets: [{
                        label: '제품 분포',
                        data: rawData.map(d => ({ 
                            x: d.month, 
                            y: d.price, 
                            r: 10 + d.lumpSumPrice/500000,
                            productName: d.productName,
                            modelName: d.modelName,
                            company: d.company
                        })),
                        backgroundColor: 'rgba(59, 130, 246, 0.5)', borderColor: '#3b82f6'
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const p = context.raw;
                                    const modelStr = p.modelName ? ` (${p.modelName})` : '';
                                    return `[${p.company}] ${p.productName}${modelStr}: ${p.y.toLocaleString()}원`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: '출시 월', color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { title: { display: true, text: '렌탈/일시불가', color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    },
                    onClick: (event, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const data = marketBubbleChart.data.datasets[0].data[index];
                            openBubbleModal(data.productName);
                        }
                    }
                }
            });
        }

        function openBubbleModal(productName) {
            const item = rawData.find(d => d.productName === productName);
            if (!item) return;

            document.getElementById('bubble-modal-title').textContent = item.productName;
            const body = document.getElementById('bubble-modal-body');
            body.innerHTML = `
                <div style="display:grid; grid-template-columns: 100px 1fr; gap: 10px;">
                    <div style="color: var(--text-secondary);">제조사</div><div>${item.company}</div>
                    <div style="color: var(--text-secondary);">모델명</div><div style="font-family: 'Courier New', monospace; font-weight: 700;">${item.modelName || '-'}</div>
                    <div style="color: var(--text-secondary);">카테고리</div><div>${item.category}</div>
                    <div style="color: var(--text-secondary);">설치타입</div><div>${item.installType}</div>
                    <div style="color: var(--text-secondary);">렌탈가</div><div style="color: var(--brand-blue); font-weight:700;">${item.price.toLocaleString()}원</div>
                    <div style="color: var(--text-secondary);">일시불가</div><div>${item.lumpSumPrice.toLocaleString()}원</div>
                    <div style="color: var(--text-secondary);">주요기능</div><div>${item.feature || '-'}</div>
                </div>
            `;
            document.getElementById('bubble-modal').style.display = 'block';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function toggleCompare(name) {
            const item = rawData.find(d => d.productName === name);
            const index = compareList.findIndex(i => i.productName === name);
            if(index > -1) compareList.splice(index, 1);
            else if(compareList.length < 3) compareList.push(item);
            
            updateCompareBar();
            // 테이블 버튼 상태 업데이트를 위해 현재 데이터로 다시 렌더링
            const searchTerm = document.getElementById('productSearch').value.toLowerCase();
            const filtered = rawData.filter(d => {
                const matchCategory = currentCategory === 'All' || d.category === currentCategory;
                const matchSub = currentSubCategory === 'All' || d.installType === currentSubCategory;
                const matchSearch = d.productName.toLowerCase().includes(searchTerm) || d.company.toLowerCase().includes(searchTerm);
                return matchCategory && matchSub && matchSearch;
            });
            renderTable(filtered);
        }

        function updateCompareBar() {
            const bar = document.getElementById('compare-bar');
            bar.classList.toggle('active', compareList.length > 0);
            document.getElementById('compare-count').textContent = compareList.length;
            document.getElementById('btn-open-compare').disabled = compareList.length === 0;
            document.getElementById('compare-items').innerHTML = compareList.map(i => `<div class="compare-item-tag">${i.productName}</div>`).join('');
        }

        function setupEvents() {
            // 메인 네비게이션
            document.getElementById('nav-launch-trend').onclick = () => showView('section-launch-trend');
            document.getElementById('nav-market-share').onclick = () => { showView('section-market-share'); initShareCharts(); };
            document.getElementById('nav-new-planning').onclick = () => showView('section-new-planning');
            
            // 대분류 필터
            document.querySelectorAll('#filterContainer .filter-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('#filterContainer .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    currentSubCategory = 'All'; // 대분류 바뀔 때 중분류 초기화
                    updateSubFilters();
                    applyFilters();
                };
            });

            // 검색창
            document.getElementById('productSearch').oninput = applyFilters;

            document.getElementById('btn-run-simulation').onclick = runSim;
            document.getElementById('btn-open-compare').onclick = openCompareModal;
            document.querySelectorAll('.close-modal').forEach(btn => {
                btn.onclick = () => {
                    document.getElementById('comparison-modal').style.display = 'none';
                    document.getElementById('bubble-modal').style.display = 'none';
                };
            });
            document.getElementById('btn-clear-compare').onclick = () => { compareList = []; updateCompareBar(); renderTable(rawData); };
        }

        function openCompareModal() {
            if (compareList.length === 0) return;
            
            const headerRow = document.getElementById('comparison-header-row');
            const tbody = document.getElementById('comparison-body');
            
            headerRow.innerHTML = '<th>항목</th>' + compareList.map(item => `<th>${item.productName}</th>`).join('');
            
            const fields = [
                { label: '제조사', key: 'company' },
                { label: '모델명', key: 'modelName' },
                { label: '카테고리', key: 'category' },
                { label: '설치타입', key: 'installType' },
                { label: '렌탈가', key: 'price', format: v => v.toLocaleString() + '원' },
                { label: '일시불가', key: 'lumpSumPrice', format: v => v.toLocaleString() + '원' },
                { label: '주요사양', key: 'capacity' },
                { label: '특징', key: 'feature' }
            ];

            tbody.innerHTML = fields.map(field => `
                <tr>
                    <td>${field.label}</td>
                    ${compareList.map(item => `<td>${field.format ? field.format(item[field.key]) : (item[field.key] || '-')}</td>`).join('')}
                </tr>
            `).join('');
            
            document.getElementById('comparison-modal').style.display = 'block';
        }

        function showView(id) {
            ['section-launch-trend', 'section-market-share', 'section-new-planning'].forEach(s => {
                document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
            });
        }

        function runSim() {
            const name = document.getElementById('plan-name').value;
            const price = parseInt(document.getElementById('plan-rental-price').value);
            const lump = parseInt(document.getElementById('plan-lump-price').value);
            const holder = document.getElementById('positioning-canvas-holder');
            holder.innerHTML = '<canvas id="planningChart"></canvas>';
            new Chart(document.getElementById('planningChart'), {
                type: 'scatter',
                data: { datasets: [{ label: '우리 제품', data: [{x: lump/10000, y: price/10000}], backgroundColor: '#3b82f6', pointRadius: 10 }] },
                options: { scales: { x: {title:{display:true,text:'일시불(만)'}}, y: {title:{display:true,text:'렌탈(만)'}} } }
            });
        }

        function initShareCharts() {
            if(companyShareChart) return;
            companyShareChart = new Chart(document.getElementById('companyShareChart'), {
                type: 'doughnut', data: { labels: MARKET_SHARE_DATA.all.labels, datasets: [{ data: MARKET_SHARE_DATA.all.shares, backgroundColor: ['#3b82f6','#ef4444','#f59e0b','#10b981','#6b7280'] }] }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
